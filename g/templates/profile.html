<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>Профиль: {{ user[1] }}</h2>

{% if session['user'] == user[1] %}
<form method="POST" enctype="multipart/form-data">
    <input type="file" name="avatar">
    <button>Обновить аватар</button>
</form>
{% endif %}

{% if user[3] %}
<img src="/static/uploads/{{ user[3] }}" class="avatar">
{% endif %}

<h3>Посты:</h3>

{% for post in posts %}
<div class="post">
    <p style="color:{{post[3]}}; font-size:{{post[4]}}px; font-family:{{post[5]}}">
        {{post[2]}}
    </p>
    {% if post[6] %}
    <img src="/static/uploads/{{post[6]}}" class="post-img">
    {% endif %}
</div>
{% endfor %}

<a href="/">На главную</a>

</body>
</html>
